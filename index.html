<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVC Optimizer v6.0 - Corps Rigide</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-2 md:p-4 font-sans text-slate-900 text-[13px]">
    <div class="max-w-7xl mx-auto bg-white shadow-2xl rounded-xl overflow-hidden border-t-8 border-slate-900">
        
        <div class="bg-slate-900 text-white p-4 flex justify-between items-center">
            <h1 class="text-xl font-bold italic tracking-tighter text-blue-400">PVC OPTIMIZER <span class="text-white text-sm opacity-50 uppercase">v6.0 RIGIDE</span></h1>
            <button onclick="resetAll()" class="bg-red-600 hover:bg-red-700 text-[10px] font-bold py-2 px-4 rounded uppercase shadow-lg active:scale-95">Reset</button>
        </div>

        <div class="p-4 grid lg:grid-cols-4 gap-6">
            <div class="space-y-3">
                <h2 class="font-bold text-orange-700 border-b-2 border-orange-100 pb-1 text-xs uppercase text-center">Annelés (5.8m)</h2>
                <div id="annel-inputs" class="space-y-1"></div>
            </div>
            <div class="space-y-3">
                <h2 class="font-bold text-blue-800 border-b-2 border-blue-100 pb-1 text-xs uppercase text-center">CR8 (3m)</h2>
                <div id="cr8-inputs" class="space-y-1"></div>
            </div>
            <div class="space-y-3">
                <h2 class="font-bold text-green-800 border-b-2 border-green-100 pb-1 text-xs uppercase text-center">Évacuation (4m)</h2>
                <div id="evac-inputs" class="space-y-1"></div>
            </div>

            <div class="bg-slate-900 rounded-xl p-5 text-white h-fit sticky top-4 shadow-xl border border-slate-700">
                <h2 class="text-center font-bold text-blue-400 mb-4 uppercase text-[10px] tracking-widest border-b border-slate-800 pb-2">Rapport de Charge</h2>
                
                <div id="status-card" class="mb-6 bg-slate-800 p-4 rounded-lg text-center border border-slate-700">
                    <span class="text-[10px] text-slate-400 uppercase block mb-1">Occupation Frontale Effective</span>
                    <span id="occ-text" class="text-4xl font-black">0%</span>
                    <div class="w-full bg-slate-700 h-2 rounded-full mt-3 overflow-hidden">
                        <div id="gauge-fill" class="h-full bg-blue-500 transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>

                <div id="results-container" class="space-y-3 text-center"></div>

                <button onclick="lancerCalcul()" class="w-full mt-6 bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded uppercase text-xs tracking-widest transition-all shadow-[0_4px_0_rgb(29,78,216)] active:translate-y-1 active:shadow-none">Actualiser le calcul</button>
            </div>
        </div>
    </div>

    <script>
        // DN_EXTERIEUR_CORPS | DN_INTERIEUR_REEL | ENCOMBREMENT_TULIPE
        const specs = {
            annel: { 
                300: { ext: 315, int: 300, tul: 350 },
                400: { ext: 420, int: 400, tul: 465 },
                500: { ext: 530, int: 500, tul: 580 },
                600: { ext: 635, int: 600, tul: 700 },
                1030: { ext: 1080, int: 1030, tul: 1200 }
            },
            cr8: { 125: 125, 160: 160, 200: 200, 250: 250, 315: 315, 400: 400 },
            evac: { 32: 32, 40: 40, 50: 50, 75: 75, 80: 80, 100: 110, 125: 125, 160: 160, 200: 200 }
        };

        const container = { w: 2340, h: 2680 };

        function init() {
            const render = (id, data, prefix) => {
                const box = document.getElementById(id);
                box.innerHTML = '';
                Object.keys(data).sort((a,b) => parseInt(a) - parseInt(b)).forEach(dn => {
                    box.innerHTML += `
                        <div class="flex justify-between items-center bg-white p-2 border rounded shadow-sm">
                            <div class="flex items-center">
                                ${prefix==='evac'?`<input type="checkbox" id="check-${dn}" onchange="toggleMode('${dn}')" class="mr-2 h-4 w-4 accent-blue-600">`:''}
                                <span class="font-bold text-slate-700">DN ${dn}</span>
                            </div>
                            <div id="wrap-${prefix}-${dn}">
                                <input type="number" id="q-${prefix}-${dn}" oninput="lancerCalcul()" class="w-16 border-b border-slate-200 text-right outline-none focus:border-blue-500 bg-transparent py-1">
                            </div>
                            <span id="lbl-${dn}" class="hidden text-[9px] font-black text-blue-600 bg-blue-50 px-2 py-1 rounded">MAX</span>
                        </div>`;
                });
            };
            render('annel-inputs', specs.annel, 'annel'); render('cr8-inputs', specs.cr8, 'cr8'); render('evac-inputs', specs.evac, 'evac');
        }

        function toggleMode(dn) {
            const check = document.getElementById(`check-${dn}`).checked;
            document.getElementById(`wrap-evac-${dn}`).style.display = check ? 'none' : 'block';
            document.getElementById(`lbl-${dn}`).style.display = check ? 'block' : 'none';
            lancerCalcul();
        }

        function resetAll() {
            document.querySelectorAll('input[type="number"]').forEach(i => i.value = '');
            document.querySelectorAll('input[type="checkbox"]').forEach(c => { c.checked = false; toggleMode(c.id.split('-')[1]); });
            lancerCalcul();
        }

        function lancerCalcul() {
            let occupationFrontale = 0;
            let di_vols = [];
            let optimizationDns = [];

            // 1. ANNELÉS : Calcul basé sur le corps du tube + tolérance manchon tête-bêche
            Object.keys(specs.annel).forEach(dn => {
                const q = parseInt(document.getElementById(`q-annel-${dn}`).value) || 0;
                if (q > 0) {
                    const s = specs.annel[dn];
                    // On considère que l'encombrement réel est une moyenne entre corps et tulipe (car emboîtement)
                    let encombrementReel = (s.ext + s.tul) / 2;
                    let surfaceTube = Math.pow(encombrementReel, 2) * 0.88; // Nid d'abeille
                    occupationFrontale += ( (q / 2) * surfaceTube ) / (container.w * container.h);
                    
                    for(let i=0; i<q; i++) {
                        di_vols.push({ di: s.int, used: 0 });
                    }
                }
            });

            // 2. CR8 & EVAC (Déjà saisis)
            const traiterTelescopage = (dn, q) => {
                let surfBesoin = q * Math.pow(dn, 2);
                di_vols.sort((a,b) => b.di - a.di).forEach(v => {
                    if (v.di >= dn + 10 && surfBesoin > 0) {
                        let dispo = Math.pow(v.di, 2) * 0.78 - v.used;
                        let prendre = Math.min(dispo, surfBesoin);
                        v.used += prendre; surfBesoin -= prendre;
                    }
                });
                if (surfBesoin > 0 && di_vols.length === 0) {
                    occupationFrontale += (surfBesoin * 0.8) / (container.w * container.h);
                }
            };

            Object.keys(specs.cr8).forEach(dn => traiterTelescopage(parseInt(dn), parseInt(document.getElementById(`q-cr8-${dn}`).value) || 0));
            
            Object.keys(specs.evac).forEach(dn => {
                const q = parseInt(document.getElementById(`q-evac-${dn}`).value) || 0;
                if (!document.getElementById(`check-${dn}`)?.checked) {
                    traiterTelescopage(parseInt(dn), q);
                } else {
                    optimizationDns.push(parseInt(dn));
                }
            });

            document.getElementById('occ-text').innerText = (occupationFrontale * 100).toFixed(1) + "%";
            document.getElementById('gauge-fill').style.width = Math.min(occupationFrontale * 100, 100) + "%";

            const resContainer = document.getElementById('results-container');
            resContainer.innerHTML = '';

            optimizationDns.forEach(targetDn => {
                let count = 0;
                di_vols.forEach(v => {
                    if (v.di >= targetDn + 5) {
                        let n = Math.floor( (Math.pow(v.di, 2) * 0.75 - v.used) / Math.pow(targetDn, 2) );
                        if (n > 0) count += n;
                    }
                });
                // Remplissage du vide container (estimé par les espaces entre tubes sur la photo)
                let resteContainer = Math.max(0, 1.1 - occupationFrontale);
                count += Math.floor( (resteContainer * (container.w * container.h) * 0.6) / Math.pow(targetDn, 2) );

                resContainer.innerHTML += `
                    <div class="bg-blue-600 p-4 rounded shadow-lg border-l-4 border-white mb-2">
                        <p class="text-[10px] font-bold opacity-80 uppercase mb-1 text-blue-100">MAX DN ${targetDn}</p>
                        <p class="text-3xl font-black">${Math.floor(count)}</p>
                    </div>`;
            });
        }
        window.onload = init;
    </script>
</body>
</html>
