<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVC Optimizer v5.4 - Sécurité Saturation</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-2 md:p-4 font-sans text-slate-900 text-[13px]">
    <div class="max-w-7xl mx-auto bg-white shadow-2xl rounded-xl overflow-hidden border-t-8 border-slate-900">
        
        <div class="bg-slate-900 text-white p-4 flex justify-between items-center">
            <h1 class="text-xl font-bold italic tracking-tighter text-blue-400">OPTIMISEUR TERRAIN <span class="text-white text-sm opacity-50 text-xs">v5.4 FIX</span></h1>
            <button onclick="resetAll()" class="bg-red-600 hover:bg-red-700 text-[10px] font-bold py-2 px-4 rounded uppercase transition-all active:scale-95">Remettre à zéro</button>
        </div>

        <div class="p-4 grid lg:grid-cols-4 gap-6">
            <div class="space-y-3">
                <h2 class="font-bold text-orange-700 border-b-2 border-orange-100 pb-1 text-xs uppercase">Annelés (5.8m)</h2>
                <div id="annel-inputs" class="space-y-1"></div>
            </div>

            <div class="space-y-3">
                <h2 class="font-bold text-blue-800 border-b-2 border-blue-100 pb-1 text-xs uppercase">CR8 (3m)</h2>
                <div id="cr8-inputs" class="space-y-1"></div>
            </div>

            <div class="space-y-3">
                <h2 class="font-bold text-green-800 border-b-2 border-green-100 pb-1 text-xs uppercase">Évacuation (4m)</h2>
                <div id="evac-inputs" class="space-y-1"></div>
            </div>

            <div class="bg-slate-900 rounded-xl p-5 text-white h-fit sticky top-4 shadow-xl border border-slate-700">
                <h2 class="text-center font-bold text-blue-400 mb-4 uppercase text-[10px] tracking-widest border-b border-slate-800 pb-2">Capacité de Charge</h2>
                
                <div id="status-card" class="mb-6 bg-slate-800 p-4 rounded-lg text-center transition-colors duration-300 border border-slate-700">
                    <span class="text-[10px] text-slate-400 uppercase block mb-1">Occupation Sol</span>
                    <span id="occ-text" class="text-4xl font-black">0%</span>
                    <div class="w-full bg-slate-700 h-2 rounded-full mt-3 overflow-hidden">
                        <div id="gauge-fill" class="h-full bg-blue-500 transition-all duration-700" style="width: 0%"></div>
                    </div>
                    <p id="alert-msg" class="hidden text-red-500 font-bold text-[10px] mt-2 uppercase animate-pulse">Container surchargé !</p>
                </div>

                <div id="results-container" class="space-y-3 text-center">
                    <p class="text-slate-500 italic">Cochez "MAX" pour optimiser.</p>
                </div>

                <button onclick="lancerCalcul()" class="w-full mt-6 bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded uppercase text-xs tracking-widest transition-all shadow-[0_4px_0_rgb(37,99,235)] active:translate-y-1 active:shadow-none">Calculer l'optimisation</button>
            </div>
        </div>
    </div>

    <script>
        const specs = {
            annel: { 300:350, 400:465, 500:580, 600:700, 1030:1200 },
            cr8: { 125:3.7, 160:4.7, 200:5.9, 250:7.3, 315:9.2, 400:11.7 },
            evac: { 32:3.0, 40:3.0, 50:3.0, 75:3.0, 80:3.0, 100:3.0, 125:3.2, 160:3.2, 200:3.9 }
        };

        const container = { w: 2340, h: 2680, surf: 6271200 }; 

        function init() {
            const render = (id, data, prefix) => {
                const box = document.getElementById(id);
                box.innerHTML = '';
                Object.keys(data).sort((a,b) => parseInt(a) - parseInt(b)).forEach(dn => {
                    box.innerHTML += `
                        <div class="flex justify-between items-center bg-white p-2 border rounded shadow-sm">
                            <div class="flex items-center">
                                ${prefix==='evac'?`<input type="checkbox" id="check-${dn}" onchange="toggleMode('${dn}')" class="mr-2 h-4 w-4 accent-blue-600">`:''}
                                <span class="font-bold text-slate-700 uppercase">DN ${dn}</span>
                            </div>
                            <div id="wrap-${prefix}-${dn}">
                                <input type="number" id="q-${prefix}-${dn}" placeholder="" oninput="lancerCalcul()" class="w-16 border-b border-slate-200 text-right outline-none focus:border-blue-500 bg-transparent py-1">
                            </div>
                            <span id="lbl-${dn}" class="hidden text-[9px] font-black text-blue-600 bg-blue-50 px-2 py-1 rounded">MAX</span>
                        </div>`;
                });
            };
            render('annel-inputs', specs.annel, 'annel');
            render('cr8-inputs', specs.cr8, 'cr8');
            render('evac-inputs', specs.evac, 'evac');
        }

        function toggleMode(dn) {
            const check = document.getElementById(`check-${dn}`).checked;
            document.getElementById(`wrap-evac-${dn}`).style.display = check ? 'none' : 'block';
            document.getElementById(`lbl-${dn}`).style.display = check ? 'block' : 'none';
            lancerCalcul();
        }

        function resetAll() {
            document.querySelectorAll('input[type="number"]').forEach(i => i.value = '');
            document.querySelectorAll('input[type="checkbox"]').forEach(c => {
                c.checked = false;
                const dn = c.id.split('-')[1];
                toggleMode(dn);
            });
            lancerCalcul();
        }

        function lancerCalcul() {
            let surfOcc = 0;
            let di_vols = []; 
            let optimizationDns = [];

            // 1. Annelés (Max 24 pour le DN 300 par ex)
            Object.keys(specs.annel).forEach(dn => {
                const q = parseInt(document.getElementById(`q-annel-${dn}`).value) || 0;
                surfOcc += Math.ceil(q / 2) * (Math.pow(specs.annel[dn], 2) * 0.907);
                for(let i=0; i<q; i++) di_vols.push({di: (specs.annel[dn] - 60) * 0.9, len: 5.8}); 
            });

            // 2. CR8
            Object.keys(specs.cr8).forEach(dn => {
                const q = parseInt(document.getElementById(`q-cr8-${dn}`).value) || 0;
                surfOcc += Math.ceil(q / 4) * (Math.pow(dn, 2) * 0.907);
                const di = dn - (2 * specs.cr8[dn]);
                for(let i=0; i<q; i++) di_vols.push({di: di * 0.9, len: 3});
            });

            // 3. EVAC
            Object.keys(specs.evac).forEach(dn => {
                const isMax = document.getElementById(`check-${dn}`)?.checked;
                const qVal = parseInt(document.getElementById(`q-evac-${dn}`).value) || 0;
                if (!isMax) {
                    surfOcc += Math.ceil(qVal / 3) * (Math.pow(dn, 2) * 0.907);
                    const di = dn - (2 * specs.evac[dn]);
                    for(let i=0; i<qVal; i++) di_vols.push({di: di * 0.9, len: 4});
                } else {
                    optimizationDns.push(parseInt(dn));
                }
            });

            const occ = (surfOcc / container.surf) * 100;
            const isOverloaded = occ > 105; // Marge de 5% tolérée

            // Affichage Occupation
            document.getElementById('occ-text').innerText = occ.toFixed(1) + "%";
            const g = document.getElementById('gauge-fill');
            const card = document.getElementById('status-card');
            const alertMsg = document.getElementById('alert-msg');
            
            g.style.width = Math.min(occ, 100) + "%";
            
            if(isOverloaded) {
                g.style.backgroundColor = '#ef4444';
                card.classList.add('border-red-500', 'bg-red-900/20');
                alertMsg.classList.remove('hidden');
            } else {
                g.style.backgroundColor = occ > 95 ? '#f59e0b' : '#3b82f6';
                card.classList.remove('border-red-500', 'bg-red-900/20');
                alertMsg.classList.add('hidden');
            }

            // Affichage Résultats
            const resContainer = document.getElementById('results-container');
            if(isOverloaded) {
                resContainer.innerHTML = '<p class="text-red-400 font-bold uppercase text-[10px]">Impossible d\'optimiser : Container déjà plein au sol.</p>';
                return;
            }

            if(optimizationDns.length > 0) resContainer.innerHTML = '';

            optimizationDns.sort((a,b) => a - b).forEach(targetDn => {
                let count = 0;
                // Calcul strict de télescopage
                di_vols.forEach(vol => {
                    // Cercle dans cercle : (DI_Hote / DE_Cible)^2 * coefficient de packing (0.82 pour le nid d'abeille réel)
                    let n = Math.floor(Math.pow(vol.di / (targetDn * 1.05), 2) * 0.82); 
                    if(n < 1 && vol.di >= (targetDn * 1.05)) n = 1;
                    count += (n * (vol.len / 4));
                });

                let resteSurf = Math.max(0, container.surf - surfOcc);
                // Dans le vide restant, on applique le même coefficient de packing strict (0.85)
                count += Math.floor((resteSurf * 0.85) / Math.pow(targetDn, 2)) * 3; 
                
                resContainer.innerHTML += `
                    <div class="bg-blue-600 p-4 rounded shadow-lg border-l-4 border-white mb-2">
                        <p class="text-[10px] font-bold opacity-80 uppercase leading-none mb-1 tracking-tighter text-blue-100 uppercase">MAX DN ${targetDn}</p>
                        <p class="text-3xl font-black">${Math.floor(count)}</p>
                    </div>`;
                if(targetDn == optimizationDns[0]) surfOcc = container.surf; 
            });
        }

        window.onload = init;
    </script>
</body>
</html>
