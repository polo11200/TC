<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVC Optimizer v3.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-200 min-h-screen p-4 font-sans">
    <div class="max-w-6xl mx-auto bg-white shadow-2xl rounded-xl overflow-hidden border-t-8 border-slate-800">
        
        <div class="bg-slate-800 text-white p-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold tracking-tighter">OPTIMISEUR PVC <span class="text-blue-400">v3.2</span></h1>
                <p class="text-[10px] opacity-75 uppercase">40' High Cube | Tulipes alignées</p>
            </div>
            <button onclick="resetAll()" class="bg-red-600 hover:bg-red-700 text-white text-xs font-bold py-2 px-4 rounded-lg transition-all shadow-lg active:scale-95 flex items-center">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                REMETTRE À ZÉRO
            </button>
        </div>

        <div class="p-6 grid lg:grid-cols-3 gap-8">
            <div>
                <h2 class="font-bold text-blue-800 border-b-2 border-blue-100 pb-2 mb-4 uppercase text-sm tracking-widest">Assainissement CR8 (3m)</h2>
                <div id="cr8-inputs" class="space-y-2"></div>
            </div>

            <div>
                <h2 class="font-bold text-green-800 border-b-2 border-green-100 pb-2 mb-4 uppercase text-sm tracking-widest">Évacuations M1 (4m)</h2>
                <div id="evac-inputs" class="space-y-2"></div>
            </div>

            <div class="bg-slate-900 rounded-xl p-6 text-white h-fit lg:sticky lg:top-4">
                <h2 class="text-center font-bold text-blue-400 mb-6 uppercase tracking-wider text-sm border-b border-slate-700 pb-2">Rapport de Charge</h2>
                
                <div class="mb-8 bg-slate-800 p-4 rounded-lg">
                    <div class="flex justify-between text-[10px] uppercase text-slate-400 mb-1">
                        <span>Saturation Frontale</span>
                        <span id="occ-text" class="font-bold text-white">0%</span>
                    </div>
                    <div class="w-full bg-slate-700 h-2 rounded-full overflow-hidden">
                        <div id="gauge-fill" class="h-full bg-blue-500 transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>

                <div id="results-container" class="space-y-4">
                    </div>

                <button onclick="lancerCalcul()" class="w-full mt-8 bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-lg shadow-lg uppercase transition-all active:scale-95 tracking-widest">
                    Calculer l'optimisation
                </button>
            </div>
        </div>
    </div>

    <script>
        const specs = {
            cr8: { 400:11.7, 315:9.2, 250:7.3, 200:5.9, 160:4.7, 125:3.7 },
            evac: { 200:3.9, 160:3.2, 125:3.2, 100:3.0, 80:3.0, 75:3.0, 50:3.0, 40:3.0, 32:3.0 }
        };

        const container = { w: 2340, h: 2680, coeff: 1.15 };

        function init() {
            // Init CR8 (Toutes à 0)
            const cr8Box = document.getElementById('cr8-inputs');
            cr8Box.innerHTML = ''; 
            Object.keys(specs.cr8).forEach(dn => {
                cr8Box.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 p-2 border rounded shadow-sm">
                        <span class="text-xs font-bold text-slate-600 uppercase">DN ${dn}</span>
                        <input type="number" id="q-cr8-${dn}" value="0" oninput="lancerCalcul()" class="w-20 p-1 border rounded text-right outline-none focus:border-blue-500">
                    </div>`;
            });

            // Init EVAC (Toutes à 0)
            const evacBox = document.getElementById('evac-inputs');
            evacBox.innerHTML = '';
            Object.keys(specs.evac).forEach(dn => {
                const isMaxDefault = (dn == 100 || dn == 32);
                evacBox.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 p-2 border rounded shadow-sm transition-all" id="box-evac-${dn}">
                        <div class="flex items-center">
                            <input type="checkbox" id="check-${dn}" ${isMaxDefault ? 'checked' : ''} onchange="toggleMode('${dn}')" class="mr-2 h-4 w-4 accent-blue-600">
                            <span class="text-xs font-bold text-slate-600 uppercase">DN ${dn}</span>
                        </div>
                        <div id="wrap-${dn}">
                            <input type="number" id="q-evac-${dn}" value="0" oninput="lancerCalcul()" class="w-16 p-1 border rounded text-right text-xs outline-none focus:border-green-500">
                        </div>
                        <span id="lbl-${dn}" class="hidden text-[9px] font-black text-blue-600 bg-blue-100 px-2 py-1 rounded">MAX</span>
                    </div>`;
            });

            Object.keys(specs.evac).forEach(dn => toggleMode(dn));
            lancerCalcul();
        }

        function toggleMode(dn) {
            const check = document.getElementById(`check-${dn}`).checked;
            document.getElementById(`wrap-${dn}`).style.display = check ? 'none' : 'block';
            document.getElementById(`lbl-${dn}`).style.display = check ? 'block' : 'none';
            document.getElementById(`box-evac-${dn}`).classList.toggle('bg-blue-50', check);
            document.getElementById(`box-evac-${dn}`).classList.toggle('border-blue-200', check);
            lancerCalcul();
        }

        function resetAll() {
            // Remet les inputs à zéro
            const inputs = document.querySelectorAll('input[type="number"]');
            inputs.forEach(input => input.value = 0);
            
            // Décoche tout sauf 100 et 32 (ou décoche tout si vous préférez)
            Object.keys(specs.evac).forEach(dn => {
                document.getElementById(`check-${dn}`).checked = (dn == 100 || dn == 32);
                toggleMode(dn);
            });
            lancerCalcul();
        }

        function lancerCalcul() {
            let surfOcc = 0;
            let di_list = []; 
            let optimizationDns = [];

            Object.keys(specs.cr8).forEach(dn => {
                const q = parseInt(document.getElementById(`q-cr8-${dn}`).value) || 0;
                surfOcc += Math.ceil(q / 4) * Math.pow(dn * container.coeff, 2);
                const di = dn - (2 * specs.cr8[dn]);
                for(let i=0; i<q; i++) di_list.push({di, len: 3});
            });

            Object.keys(specs.evac).forEach(dn => {
                const isMax = document.getElementById(`check-${dn}`).checked;
                if (!isMax) {
                    const q = parseInt(document.getElementById(`q-evac-${dn}`).value) || 0;
                    surfOcc += Math.ceil(q / 3) * Math.pow(dn * container.coeff, 2);
                    const di = dn - (2 * specs.evac[dn]);
                    for(let i=0; i<q; i++) di_list.push({di, len: 4});
                } else {
                    optimizationDns.push(parseInt(dn));
                }
            });

            optimizationDns.sort((a, b) => b - a);

            const surfTotal = container.w * container.h;
            const occ = (surfOcc / surfTotal) * 100;
            const resContainer = document.getElementById('results-container');
            resContainer.innerHTML = '';

            optimizationDns.forEach(targetDn => {
                let insideCount = 0;
                di_list.forEach(item => {
                    let n = Math.floor(Math.pow(item.di / (targetDn * 1.08), 2) * 0.82);
                    if(n < 1 && item.di >= (targetDn + 5)) n = 1;
                    insideCount += (n * (item.len / 4)); 
                });

                let extraCount = 0;
                if (targetDn === optimizationDns[0]) {
                    extraCount = Math.floor(Math.max(0, surfTotal - surfOcc) / Math.pow(targetDn * 1.15, 2)) * 3;
                    surfOcc = surfTotal; 
                }

                resContainer.innerHTML += `
                    <div class="bg-blue-600/30 border border-blue-500/50 p-4 rounded-lg shadow-md">
                        <p class="text-[9px] uppercase font-bold text-blue-300 tracking-widest">DN ${targetDn} Optimisé</p>
                        <p class="text-4xl font-black">${Math.floor(insideCount + extraCount)}</p>
                        <p class="text-[9px] opacity-60 mt-1 italic italic">Nombre max tubes de 4m</p>
                    </div>`;
            });

            document.getElementById('occ-text').innerText = occ.toFixed(1) + "%";
            const g = document.getElementById('gauge-fill');
            g.style.width = Math.min(occ, 100) + "%";
            g.style.backgroundColor = occ > 100 ? '#ef4444' : (occ > 90 ? '#f97316' : '#3b82f6');
        }

        window.onload = init;
    </script>
</body>
</html>
