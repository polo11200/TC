<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVC Optimizer v3.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-200 min-h-screen p-4">
    <div class="max-w-6xl mx-auto bg-white shadow-2xl rounded-xl overflow-hidden">
        
        <div class="bg-slate-800 text-white p-6">
            <h1 class="text-2xl font-bold">OPTIMISEUR LOGISTIQUE PVC <span class="text-blue-400">v3.1</span></h1>
            <p class="text-xs opacity-75 italic text-right font-light">Config : 40' High Cube | Tulipes alignées</p>
        </div>

        <div class="p-6 grid lg:grid-cols-3 gap-8">
            <div>
                <h2 class="font-bold text-blue-800 border-b-2 border-blue-100 pb-2 mb-4">CR8 ASSAINISSEMENT (3m)</h2>
                <div id="cr8-inputs" class="space-y-2"></div>
            </div>

            <div>
                <h2 class="font-bold text-green-800 border-b-2 border-green-100 pb-2 mb-4">ÉVACUATIONS M1 (4m)</h2>
                <p class="text-[10px] text-slate-500 mb-4 bg-slate-50 p-2 rounded">Cochez "MAX" pour optimiser ce diamètre.</p>
                <div id="evac-inputs" class="space-y-2"></div>
            </div>

            <div class="bg-slate-900 rounded-xl p-6 text-white h-fit sticky top-4">
                <h2 class="text-center font-bold text-blue-400 mb-6 uppercase tracking-wider">Rapport de Charge</h2>
                
                <div class="mb-8">
                    <div class="flex justify-between text-xs mb-1">
                        <span>Occupation Surface</span>
                        <span id="occ-text" class="font-bold">0%</span>
                    </div>
                    <div class="w-full bg-slate-700 h-3 rounded-full overflow-hidden">
                        <div id="gauge-fill" class="h-full bg-blue-500 transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>

                <div id="results-container" class="space-y-4">
                    </div>

                <button onclick="lancerCalcul()" class="w-full mt-8 bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-lg shadow-lg uppercase transition-all active:scale-95">
                    Lancer l'optimisation
                </button>
            </div>
        </div>
    </div>

    <script>
        const specs = {
            cr8: { 400:11.7, 315:9.2, 250:7.3, 200:5.9, 160:4.7, 125:3.7 },
            evac: { 200:3.9, 160:3.2, 125:3.2, 100:3.0, 80:3.0, 75:3.0, 50:3.0, 40:3.0, 32:3.0 }
        };

        const container = { w: 2340, h: 2680, coeff: 1.15 };

        function init() {
            // Rendu CR8
            const cr8Box = document.getElementById('cr8-inputs');
            cr8Box.innerHTML = ''; 
            Object.keys(specs.cr8).forEach(dn => {
                let val = (dn==200?400:(dn==315?100:(dn==160?50:(dn==250?50:(dn==400?10:0)))));
                cr8Box.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 p-2 border rounded shadow-sm">
                        <span class="text-sm font-bold">DN ${dn}</span>
                        <input type="number" id="q-cr8-${dn}" value="${val}" class="w-20 p-1 border rounded text-right outline-none">
                    </div>`;
            });

            // Rendu EVAC
            const evacBox = document.getElementById('evac-inputs');
            evacBox.innerHTML = '';
            Object.keys(specs.evac).forEach(dn => {
                let defaultVal = 0;
                if(dn == 200) defaultVal = 100;
                if(dn == 125) defaultVal = 260;
                if(dn == 80) defaultVal = 100;
                if(dn == 50) defaultVal = 500;
                if(dn == 40) defaultVal = 500;
                
                const isMax = (dn == 100 || dn == 32);
                evacBox.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 p-2 border rounded shadow-sm">
                        <div class="flex items-center">
                            <input type="checkbox" id="check-${dn}" ${isMax ? 'checked' : ''} onchange="toggleMode('${dn}')" class="mr-2 h-4 w-4">
                            <span class="text-sm font-bold">DN ${dn}</span>
                        </div>
                        <div id="wrap-${dn}">
                            <input type="number" id="q-evac-${dn}" value="${defaultVal}" class="w-16 p-1 border rounded text-right text-sm">
                        </div>
                        <span id="lbl-${dn}" class="hidden text-[10px] font-bold text-blue-600 bg-blue-100 px-2 py-1 rounded">MAX</span>
                    </div>`;
            });

            Object.keys(specs.evac).forEach(dn => toggleMode(dn));
            lancerCalcul();
        }

        function toggleMode(dn) {
            const check = document.getElementById(`check-${dn}`).checked;
            document.getElementById(`wrap-${dn}`).style.display = check ? 'none' : 'block';
            document.getElementById(`lbl-${dn}`).style.display = check ? 'block' : 'none';
        }

        function lancerCalcul() {
            let surfOcc = 0;
            let di_list = []; 
            let optimizationDns = [];

            // CR8
            Object.keys(specs.cr8).forEach(dn => {
                const q = parseInt(document.getElementById(`q-cr8-${dn}`).value) || 0;
                surfOcc += Math.ceil(q / 4) * Math.pow(dn * container.coeff, 2);
                const di = dn - (2 * specs.cr8[dn]);
                for(let i=0; i<q; i++) di_list.push({di, len: 3});
            });

            // EVAC
            Object.keys(specs.evac).forEach(dn => {
                const isMax = document.getElementById(`check-${dn}`).checked;
                if (!isMax) {
                    const q = parseInt(document.getElementById(`q-evac-${dn}`).value) || 0;
                    surfOcc += Math.ceil(q / 3) * Math.pow(dn * container.coeff, 2);
                    const di = dn - (2 * specs.evac[dn]);
                    for(let i=0; i<q; i++) di_list.push({di, len: 4});
                } else {
                    optimizationDns.push(parseInt(dn));
                }
            });

            optimizationDns.sort((a, b) => b - a);

            const surfTotal = container.w * container.h;
            const occ = (surfOcc / surfTotal) * 100;
            const resContainer = document.getElementById('results-container');
            resContainer.innerHTML = '';

            optimizationDns.forEach(targetDn => {
                let insideCount = 0;
                di_list.forEach(item => {
                    let n = Math.floor(Math.pow(item.di / (targetDn * 1.08), 2) * 0.80);
                    if(n < 1 && item.di >= (targetDn + 5)) n = 1;
                    insideCount += (n * (item.len / 4)); 
                });

                let extraCount = 0;
                if (targetDn === optimizationDns[0]) {
                    extraCount = Math.floor(Math.max(0, surfTotal - surfOcc) / Math.pow(targetDn * 1.15, 2)) * 3;
                    surfOcc = surfTotal; 
                }

                resContainer.innerHTML += `
                    <div class="bg-blue-600 p-4 rounded-lg shadow-md border border-blue-400">
                        <p class="text-[10px] uppercase font-bold text-blue-100">DN ${targetDn} Optimisé</p>
                        <p class="text-4xl font-black">${Math.floor(insideCount + extraCount)}</p>
                    </div>`;
            });

            document.getElementById('occ-text').innerText = occ.toFixed(1) + "%";
            document.getElementById('gauge-fill').style.width = Math.min(occ, 100) + "%";
            document.getElementById('gauge-fill').style.backgroundColor = occ > 100 ? '#ef4444' : '#3b82f6';
        }

        window.onload = init;
    </script>
</body>
</html>
