<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVC Optimizer v5.1 - Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-2 md:p-4 font-sans text-slate-900">
    <div class="max-w-7xl mx-auto bg-white shadow-2xl rounded-xl overflow-hidden border-t-8 border-slate-900">
        
        <div class="bg-slate-900 text-white p-4 flex justify-between items-center">
            <h1 class="text-xl font-bold italic">PVC OPTIMIZER <span class="text-blue-400 text-sm italic">v5.1 TERRAIN</span></h1>
            <button onclick="resetAll()" class="bg-red-600 hover:bg-red-700 text-[10px] font-bold py-2 px-4 rounded uppercase transition-all shadow-lg active:scale-95">Remettre à zéro</button>
        </div>

        <div class="p-4 grid lg:grid-cols-4 gap-6">
            <div class="space-y-3">
                <h2 class="font-bold text-orange-700 border-b-2 border-orange-100 pb-1 text-xs uppercase">Annelés (5.8m)</h2>
                <div id="annel-inputs" class="space-y-1"></div>
            </div>

            <div class="space-y-3">
                <h2 class="font-bold text-blue-800 border-b-2 border-blue-100 pb-1 text-xs uppercase">CR8 (3m)</h2>
                <div id="cr8-inputs" class="space-y-1"></div>
            </div>

            <div class="space-y-3">
                <h2 class="font-bold text-green-800 border-b-2 border-green-100 pb-1 text-xs uppercase">Évacuation M1 (4m)</h2>
                <div id="evac-inputs" class="space-y-1"></div>
            </div>

            <div class="bg-slate-900 rounded-xl p-5 text-white h-fit sticky top-4 shadow-xl">
                <h2 class="text-center font-bold text-blue-400 mb-4 uppercase text-[10px] tracking-widest border-b border-slate-700 pb-2">Charge TC 40' HC</h2>
                
                <div class="mb-6 bg-slate-800 p-4 rounded-lg text-center border border-slate-700">
                    <span class="text-[10px] text-slate-400 uppercase block mb-1">Occupation Frontale</span>
                    <span id="occ-text" class="text-4xl font-black">0%</span>
                    <div class="w-full bg-slate-700 h-2 rounded-full mt-3 overflow-hidden">
                        <div id="gauge-fill" class="h-full bg-blue-500 transition-all duration-700" style="width: 0%"></div>
                    </div>
                </div>

                <div id="results-container" class="space-y-3"></div>

                <button onclick="lancerCalcul()" class="w-full mt-6 bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded uppercase text-xs tracking-widest transition-all shadow-[0_4px_0_rgb(37,99,235)] active:translate-y-1 active:shadow-none">Calculer l'optimisation</button>
            </div>
        </div>
    </div>

    <script>
        const specs = {
            annel: { 300:350, 400:465, 500:580, 600:700, 1030:1200 },
            cr8: { 125:3.7, 160:4.7, 200:5.9, 250:7.3, 315:9.2, 400:11.7 },
            evac: { 32:3.0, 40:3.0, 50:3.0, 75:3.0, 80:3.0, 100:3.0, 125:3.2, 160:3.2, 200:3.9 }
        };

        const container = { w: 2340, h: 2680, coeff: 1.01 }; 

        function init() {
            const render = (id, data, prefix) => {
                const box = document.getElementById(id);
                box.innerHTML = '';
                // Tri par DN croissant (plus petit au plus grand)
                Object.keys(data).sort((a,b) => parseInt(a) - parseInt(b)).forEach(dn => {
                    box.innerHTML += `
                        <div class="flex justify-between items-center bg-white p-2 border rounded shadow-sm text-[12px]">
                            <div class="flex items-center">
                                ${prefix==='evac'?`<input type="checkbox" id="check-${dn}" onchange="toggleMode('${dn}')" class="mr-2 h-4 w-4 accent-blue-600">`:''}
                                <span class="font-bold text-slate-700 uppercase">DN ${dn}</span>
                            </div>
                            <div id="wrap-${prefix}-${dn}">
                                <input type="number" id="q-${prefix}-${dn}" placeholder="" oninput="lancerCalcul()" class="w-16 border-b border-slate-300 text-right outline-none focus:border-blue-500 bg-transparent">
                            </div>
                            <span id="lbl-${dn}" class="hidden text-[9px] font-black text-blue-600 bg-blue-50 px-2 py-1 rounded">MAX</span>
                        </div>`;
                });
            };
            render('annel-inputs', specs.annel, 'annel');
            render('cr8-inputs', specs.cr8, 'cr8');
            render('evac-inputs', specs.evac, 'evac');
        }

        function toggleMode(dn) {
            const check = document.getElementById(`check-${dn}`).checked;
            document.getElementById(`wrap-evac-${dn}`).style.display = check ? 'none' : 'block';
            document.getElementById(`lbl-${dn}`).style.display = check ? 'block' : 'none';
            lancerCalcul();
        }

        function resetAll() {
            document.querySelectorAll('input[type="number"]').forEach(i => i.value = '');
            document.querySelectorAll('input[type="checkbox"]').forEach(c => {
                c.checked = false;
                const dn = c.id.split('-')[1];
                toggleMode(dn);
            });
            lancerCalcul();
        }

        function lancerCalcul() {
            let surfOcc = 0;
            let di_list = []; 
            let optimizationDns = [];

            Object.keys(specs.annel).forEach(dn => {
                const q = parseInt(document.getElementById(`q-annel-${dn}`).value) || 0;
                surfOcc += Math.ceil(q / 2) * (Math.pow(specs.annel[dn], 2) * 0.907); // 0.907 = Facteur de compacité Nid d'abeille
                for(let i=0; i<q; i++) di_list.push({di: specs.annel[dn]-30, len: 5.8});
            });

            Object.keys(specs.cr8).forEach(dn => {
                const q = parseInt(document.getElementById(`q-cr8-${dn}`).value) || 0;
                surfOcc += Math.ceil(q / 4) * (Math.pow(dn, 2) * 0.907);
                const di = dn - (2 * specs.cr8[dn]);
                for(let i=0; i<q; i++) di_list.push({di: di, len: 3});
            });

            Object.keys(specs.evac).forEach(dn => {
                const isMax = document.getElementById(`check-${dn}`)?.checked;
                if (!isMax) {
                    const q = parseInt(document.getElementById(`q-evac-${dn}`).value) || 0;
                    surfOcc += Math.ceil(q / 3) * (Math.pow(dn, 2) * 0.907);
                    const di = dn - (2 * specs.evac[dn]);
                    for(let i=0; i<q; i++) di_list.push({di: di, len: 4});
                } else {
                    optimizationDns.push(parseInt(dn));
                }
            });

            const surfTotal = container.w * container.h;
            const resContainer = document.getElementById('results-container');
            resContainer.innerHTML = '';

            // Tri des résultats par DN croissant pour l'affichage
            optimizationDns.sort((a,b) => a - b).forEach(targetDn => {
                let count = 0;
                // Télescopage ultra-agressif (imbrication tulipes incluse)
                di_list.forEach(vol => {
                    let n = Math.floor(Math.pow(vol.di / (targetDn * 0.98), 2) * 1.05); // Facteur > 1 car déformation possible des parois
                    if(n < 1 && vol.di >= targetDn) n = 1;
                    count += (n * (vol.len / 4));
                });

                let resteSurf = Math.max(0, surfTotal - surfOcc);
                // 4.2 piles au lieu de 3 car on comble chaque recoin du High Cube
                count += Math.floor(resteSurf / (Math.pow(targetDn, 2) * 0.88)) * 4.2; 
                
                resContainer.innerHTML += `
                    <div class="bg-blue-600 p-4 rounded shadow-lg border-l-4 border-white">
                        <p class="text-[10px] font-bold opacity-80 uppercase leading-none mb-1 tracking-tighter text-blue-100">MAX DN ${targetDn}</p>
                        <p class="text-3xl font-black">${Math.floor(count)}</p>
                    </div>`;
            });

            const occ = (surfOcc / surfTotal) * 100;
            document.getElementById('occ-text').innerText = Math.min(occ, 100).toFixed(1) + "%";
            const g = document.getElementById('gauge-fill');
            g.style.width = Math.min(occ, 100) + "%";
            g.style.backgroundColor = occ > 100 ? '#ef4444' : '#3b82f6';
        }

        window.onload = init;
    </script>
</body>
</html>
